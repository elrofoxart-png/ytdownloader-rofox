<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video & Audio Downloader</title>
    <style>
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-card: #212121;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --accent: #ff0000;
            --accent-hover: #cc0000;
            --border: #303030;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="url"] {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="url"]:focus {
            border-color: var(--accent);
        }

        button {
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 600;
        }

        button:hover {
            background: var(--accent-hover);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            font-weight: 500;
        }

        .tab.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        .info-section {
            margin-top: 20px;
        }

        .video-info {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .video-info.show {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .thumbnail {
            width: 100%;
            max-width: 480px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .video-title {
            font-size: 1.2rem;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .video-meta {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .quality-select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .progress {
            display: none;
            margin-top: 20px;
        }

        .progress.show {
            display: block;
        }

        .progress-bar {
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            margin-top: 10px;
            color: var(--text-secondary);
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 20px;
            background: #1a4721;
            border-radius: 8px;
            margin-top: 20px;
        }

        .success-message.show {
            display: block;
        }

        .download-link {
            color: #4caf50;
            text-decoration: none;
        }

        .error {
            color: #ff5252;
            background: rgba(255, 82, 82, 0.1);
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }

        .error.show {
            display: block;
        }

        footer {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 40px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>YouTube Downloader</h1>
            <p class="subtitle">Download videos and audio from YouTube</p>
        </header>

        <div class="card">
            <div class="tabs">
                <div class="tab active" onclick="setTab('video')">📹 MP4 Video</div>
                <div class="tab" onclick="setTab('audio')">🎵 MP3 Audio</div>
            </div>

            <div class="input-group">
                <input type="url" id="urlInput" placeholder="Paste YouTube URL here..." required>
                <button onclick="fetchInfo()" id="fetchBtn">Search</button>
            </div>

            <div class="info-section">
                <div class="video-info" id="videoInfo">
                    <img class="thumbnail" id="thumbnail" src="" alt="Video thumbnail">
                    <h2 class="video-title" id="videoTitle"></h2>
                    <p class="video-meta" id="videoMeta"></p>
                    
                    <select class="quality-select" id="qualitySelect">
                        <option value="">Select quality...</option>
                    </select>
                    
                    <button onclick="download()" id="downloadBtn" style="width: 100%;">Download</button>
                </div>

                <div class="progress" id="progress">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <p class="progress-text" id="progressText">Preparing download...</p>
                </div>

                <div class="success-message" id="successMessage">
                    <p>✅ Download complete!</p>
                    <a href="#" class="download-link" id="downloadLink" target="_blank">Click to download file</a>
                </div>

                <div class="error" id="error"></div>
            </div>
        </div>

        <footer>
            <p>Local development server &copy; 2025</p>
        </footer>
    </div>

    <script>
        let currentTab = 'video';
        let currentVideoId = '';

        function setTab(type) {
            currentTab = type;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }

        async function fetchInfo() {
            const url = document.getElementById('urlInput').value;
            if (!url) return;

            const btn = document.getElementById('fetchBtn');
            btn.disabled = true;
            btn.textContent = 'Loading...';
            
            hideError();

            try {
                const response = await fetch('/api/info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                const data = await response.json();

                if (data.error) {
                    showError(data.error);
                    return;
                }

                currentVideoId = data.id;
                document.getElementById('thumbnail').src = data.thumbnail;
                document.getElementById('videoTitle').textContent = data.title;
                document.getElementById('videoMeta').textContent = 
                    `${data.uploader} • ${formatDuration(data.duration)}`;
                
                const select = document.getElementById('qualitySelect');
                select.innerHTML = '<option value="">Select quality...</option>';
                
                if (currentTab === 'video') {
                    data.formats
                        .filter(f => f.has_video)
                        .forEach(f => {
                            const option = document.createElement('option');
                            option.value = f.format_id;
                            option.textContent = `${f.quality} (${f.ext.toUpperCase()})`;
                            select.appendChild(option);
                        });
                } else {
                    data.formats
                        .filter(f => f.has_audio && !f.has_video)
                        .forEach(f => {
                            const option = document.createElement('option');
                            option.value = f.format_id;
                            option.textContent = `Audio ${f.quality} (${f.ext.toUpperCase()})`;
                            select.appendChild(option);
                        });
                }

                document.getElementById('videoInfo').classList.add('show');

            } catch (err) {
                showError('Failed to fetch video info');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Search';
            }
        }

        async function download() {
            const url = document.getElementById('urlInput').value;
            
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('downloadBtn').textContent = 'Downloading...';
            document.getElementById('progress').classList.add('show');
            
            hideError();

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        url, 
                        type: currentTab 
                    })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('progress').classList.remove('show');
                    document.getElementById('successMessage').classList.add('show');
                    document.getElementById('downloadLink').href = `/api/file/${data.filename}`;
                } else {
                    showError(data.error || 'Download failed');
                }

            } catch (err) {
                showError('Download failed');
            } finally {
                document.getElementById('downloadBtn').disabled = false;
                document.getElementById('downloadBtn').textContent = 'Download';
            }
        }

        function formatDuration(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.classList.add('show');
        }

        function hideError() {
            document.getElementById('error').classList.remove('show');
            document.getElementById('videoInfo').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
        }
    </script>
</body>
</html>
